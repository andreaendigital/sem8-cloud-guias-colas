name: CI/CD Pipeline — Monorepo sem8

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Build & Push guias-service
  # ─────────────────────────────────────────────────────────────
  build-guias:
    name: Build guias-service
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/guias-service
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Empaquetar guias-service
        run: mvn -B clean package -DskipTests
        working-directory: guias-service

      - uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push guias-service
        uses: docker/build-push-action@v6
        with:
          context: ./guias-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  # ─────────────────────────────────────────────────────────────
  # Job 2: Build & Push producer
  # ─────────────────────────────────────────────────────────────
  build-producer:
    name: Build producer
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/producer
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Empaquetar producer
        run: mvn -B clean package -DskipTests
        working-directory: producer

      - uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push producer
        uses: docker/build-push-action@v6
        with:
          context: ./producer
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  # ─────────────────────────────────────────────────────────────
  # Job 3: Build & Push consumer
  # ─────────────────────────────────────────────────────────────
  build-consumer:
    name: Build consumer
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/consumer
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Empaquetar consumer
        run: mvn -B clean package -DskipTests
        working-directory: consumer

      - uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push consumer
        uses: docker/build-push-action@v6
        with:
          context: ./consumer
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

  # ─────────────────────────────────────────────────────────────
  # Job 4: Deploy en EC2
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: [build-guias, build-producer, build-consumer]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy microservicios en EC2
        uses: appleboy/ssh-action@master
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_DRIVER: org.postgresql.Driver
          DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 600s
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE_TAG,DB_URL,DB_USERNAME,DB_PASSWORD,DB_DRIVER,DB_DIALECT,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_REGION,S3_BUCKET_NAME,RABBITMQ_USERNAME,RABBITMQ_PASSWORD,AZURE_TENANT_ID,AZURE_CLIENT_ID,AZURE_CLIENT_SECRET
          script: |
            set -e
            mkdir -p /home/ec2-user/sem8
            cd /home/ec2-user/sem8

            # Autenticarse en Docker Hub desde el EC2
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            # Crear red compartida si no existe
            docker network create sem8-net || true

            # Escribir .env con todas las variables
            cat > .env << EOF
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            IMAGE_TAG=${IMAGE_TAG}
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            DB_DRIVER=${DB_DRIVER}
            DB_DIALECT=${DB_DIALECT}
            AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
            AWS_REGION=${AWS_REGION}
            S3_BUCKET_NAME=${S3_BUCKET_NAME}
            RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            AZURE_TENANT_ID=${AZURE_TENANT_ID}
            AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
            AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
            EOF

            # Escribir docker-compose.prod.yml en el servidor
            cat > docker-compose.prod.yml << 'COMPOSEOF'
            version: '3.9'
            services:
              rabbitmq:
                image: rabbitmq:4-management
                container_name: rabbitmq
                ports:
                  - "5672:5672"
                  - "15672:15672"
                environment:
                  RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
                  RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
                healthcheck:
                  test: ["CMD", "rabbitmq-diagnostics", "ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 10
                networks:
                  - sem8-net

              guias-service:
                image: ${DOCKERHUB_USERNAME}/guias-service:latest
                container_name: guias-service
                ports:
                  - "8080:8080"
                environment:
                  SERVER_PORT: 8080
                  SPRING_DATASOURCE_URL: ${DB_URL}
                  SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
                  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
                  SPRING_DATASOURCE_DRIVER: ${DB_DRIVER}
                  JPA_DIALECT: ${DB_DIALECT}
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
                  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
                  AWS_REGION: ${AWS_REGION}
                  AWS_ENDPOINT_OVERRIDE: ""
                  S3_BUCKET_NAME: ${S3_BUCKET_NAME}
                  EFS_MOUNT_PATH: /tmp/efs-local
                  PDF_ASYNC_POOL_SIZE: 4
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
                  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
                  AZURE_TENANT_ID: ${AZURE_TENANT_ID}
                  AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
                  AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
                  JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Xmx160m"
                depends_on:
                  rabbitmq:
                    condition: service_healthy
                networks:
                  - sem8-net

              producer:
                image: ${DOCKERHUB_USERNAME}/producer:latest
                container_name: producer
                ports:
                  - "8081:8081"
                environment:
                  SERVER_PORT: 8081
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
                  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
                  AZURE_TENANT_ID: ${AZURE_TENANT_ID}
                  AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
                  AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
                  JAVA_OPTS: "-Xmx120m"
                depends_on:
                  rabbitmq:
                    condition: service_healthy
                networks:
                  - sem8-net

              consumer:
                image: ${DOCKERHUB_USERNAME}/consumer:latest
                container_name: consumer
                ports:
                  - "8082:8082"
                environment:
                  SERVER_PORT: 8082
                  SPRING_DATASOURCE_URL: ${DB_URL}
                  SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
                  SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
                  SPRING_DATASOURCE_DRIVER: ${DB_DRIVER}
                  JPA_DIALECT: ${DB_DIALECT}
                  DB_URL: ${DB_URL}
                  DB_USERNAME: ${DB_USERNAME}
                  DB_PASSWORD: ${DB_PASSWORD}
                  RABBITMQ_HOST: rabbitmq
                  RABBITMQ_PORT: 5672
                  RABBITMQ_USERNAME: ${RABBITMQ_USERNAME}
                  RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
                  AZURE_TENANT_ID: ${AZURE_TENANT_ID}
                  AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
                  AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
                  JAVA_OPTS: "-Xmx120m"
                depends_on:
                  rabbitmq:
                    condition: service_healthy
                networks:
                  - sem8-net

            networks:
              sem8-net:
                driver: bridge
            COMPOSEOF

            # Descargar imágenes actualizadas
            docker compose -f docker-compose.prod.yml pull

            # Bajar stack anterior y levantar nuevo
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d

            # Limpiar imágenes antiguas
            docker image prune -f

            # Verificar que los contenedores están corriendo
            docker ps --filter name=guias-service
            docker ps --filter name=producer
            docker ps --filter name=consumer
            docker ps --filter name=rabbitmq

            echo ""
            echo "✓ Despliegue exitoso"
            PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4)
            echo "  guias-service: http://${PUBLIC_IP}:8080/actuator/health"
            echo "  producer:      http://${PUBLIC_IP}:8081/actuator/health"
            echo "  consumer:      http://${PUBLIC_IP}:8082/actuator/health"
            echo "  RabbitMQ UI:   http://${PUBLIC_IP}:15672"
