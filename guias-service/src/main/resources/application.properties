# ============================================================
# Servidor — puerto 8090 para dejar 8080 libre al API Gateway
# ============================================================
server.port=${SERVER_PORT:8090}
spring.application.name=guias-service

# ============================================================
# Base de datos — PostgreSQL RDS (producción) / H2 (local)
# Las variables SPRING_DATASOURCE_* son inyectadas por Docker
# desde los GitHub Secrets vía docker-compose.
# ============================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# ============================================================
# JWT
# TODO: Reactivar para Experiencia 2
# ============================================================
# jwt.secret=${JWT_SECRET:dev-secret-key-min-32-chars-long!!}
#jwt.secret=dev-secret-key-min-32-chars-long!!

# ============================================================
# AWS S3
# ============================================================
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${S3_BUCKET_NAME:guias-local}
aws.endpoint.override=${AWS_ENDPOINT_OVERRIDE:}

# ============================================================
# EFS / almacenamiento de PDFs
# ============================================================
efs.mount.path=${EFS_MOUNT_PATH:/mnt/efs}

# ============================================================
# Thread pool para generación asíncrona de PDF
# ============================================================
pdf.async.pool.size=${PDF_ASYNC_POOL_SIZE:4}

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

# Jackson — serializar LocalDate como string ISO
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ============================================================
# OAuth2 Resource Server — Azure AD B2C
# Los valores sensibles se inyectan desde variables de entorno
# (GitHub Secrets → EC2 env → contenedor Docker)
# ============================================================

# Tenant ID: se lee de la variable de entorno AZURE_TENANT_ID
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://duocrosero.b2clogin.com/${AZURE_TENANT_ID}/v2.0/

# JWK Set URI para verificar firma del token
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://duocrosero.b2clogin.com/duocrosero.onmicrosoft.com/discovery/v2.0/keys?p=b2c_1_signupsignin

# Azure AD B2C — client credentials (usados si el servicio actúa como cliente OAuth2)
spring.cloud.azure.active-directory.b2c.profile.tenant-id=${AZURE_TENANT_ID}
spring.cloud.azure.active-directory.b2c.credential.client-id=${AZURE_CLIENT_ID}
spring.cloud.azure.active-directory.b2c.credential.client-secret=${AZURE_CLIENT_SECRET}


