# ============================================================
# Servidor
# ============================================================
server.port=${SERVER_PORT:8081}
spring.application.name=producer

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=/

# ============================================================
# Jackson — serializar LocalDate como string ISO
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false

# ============================================================
# OAuth2 Resource Server (Azure AD B2C)
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://duocrosero.b2clogin.com/49182dae-b700-44dd-8111-dd18494def6f/v2.0/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://duocrosero.b2clogin.com/duocrosero.onmicrosoft.com/discovery/v2.0/keys?p=b2c_1_signupsignin

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
