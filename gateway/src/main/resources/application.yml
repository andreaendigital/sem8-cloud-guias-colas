server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: gateway

  # ──────────────────────────────────────────────────────────────
  # OAuth2 Resource Server — Azure AD B2C (primera capa de seguridad)
  # Los valores sensibles se inyectan desde variables de entorno.
  # NUNCA escribir el tenant-id ni secrets en texto plano aquí.
  # ──────────────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://duocrosero.b2clogin.com/${AZURE_TENANT_ID}/v2.0/
          jwk-set-uri: https://duocrosero.b2clogin.com/duocrosero.onmicrosoft.com/discovery/v2.0/keys?p=b2c_1_signupsignin

  # ──────────────────────────────────────────────────────────────
  # Bloque cloud unificado — azure + gateway bajo la misma clave
  # (YAML no permite la clave 'cloud' duplicada al mismo nivel)
  # ──────────────────────────────────────────────────────────────
  cloud:
    azure:
      active-directory:
        b2c:
          profile:
            tenant-id: ${AZURE_TENANT_ID}
          credential:
            client-id: ${AZURE_CLIENT_ID}
            client-secret: ${AZURE_CLIENT_SECRET}

    gateway:
      # Propagar el header Authorization al microservicio destino
      default-filters:
        - TokenRelay=

      routes:

        # ── Ruta 1: guias-service ──────────────────────────
        - id: guias-service
          uri: ${GUIAS_SERVICE_URL:http://guias-service:8090}
          predicates:
            - Path=/api/v1/guias/**
          filters:
            - name: CircuitBreaker
              args:
                name: guias-cb
                fallbackUri: forward:/fallback/guias

        # ── Ruta 2: producer ───────────────────────────────
        - id: producer
          uri: ${PRODUCER_URL:http://producer:8081}
          predicates:
            - Path=/api/v1/producer/**
          filters:
            - name: CircuitBreaker
              args:
                name: producer-cb
                fallbackUri: forward:/fallback/producer

        # ── Ruta 3: consumer ───────────────────────────────
        - id: consumer
          uri: ${CONSUMER_URL:http://consumer:8082}
          predicates:
            - Path=/api/v1/consumer/**
          filters:
            - name: CircuitBreaker
              args:
                name: consumer-cb
                fallbackUri: forward:/fallback/consumer

# ──────────────────────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ──────────────────────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────────────────────
logging:
  level:
    "[org.springframework.cloud.gateway]": INFO
    "[org.springframework.security]": INFO
