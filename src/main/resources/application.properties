# ============================================================
# Base de datos
# ============================================================
spring.datasource.url=${DB_URL:jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always

# ============================================================
# JWT
# TODO: Reactivar para Experiencia 2
# ============================================================
# jwt.secret=${JWT_SECRET:dev-secret-key-min-32-chars-long!!}
jwt.secret=dev-secret-key-min-32-chars-long!!

# ============================================================
# AWS S3
# ============================================================
aws.region=${AWS_REGION:us-east-1}
aws.s3.bucket=${S3_BUCKET_NAME:guias-local}
aws.endpoint.override=${AWS_ENDPOINT_OVERRIDE:}

# ============================================================
# EFS / almacenamiento local de PDFs
# ============================================================
efs.mount.path=${EFS_MOUNT_PATH:/tmp/efs-local}

# ============================================================
# Thread pool para generaciĂ³n asĂ­ncrona de PDF
# ============================================================
pdf.async.pool.size=${PDF_ASYNC_POOL_SIZE:4}

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
