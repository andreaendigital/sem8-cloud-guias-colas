version: '3.9'

# =============================================================
# MONOREPO sem8
# Servicios: gateway | guias-service | producer | consumer | rabbitmq
#
# Punto de entrada único: http://localhost:8080
#   /api/v1/guias/**    → guias-service:8090
#   /api/v1/producer/** → producer:8081
#   /api/v1/consumer/** → consumer:8082
#
# Variables de entorno requeridas (desde .env o GitHub Secrets):
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   DB_URL, DB_USERNAME, DB_PASSWORD  (RDS PostgreSQL en prod)
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, S3_BUCKET_NAME
#   RABBITMQ_HOST, RABBITMQ_USERNAME, RABBITMQ_PASSWORD
# =============================================================

services:

  # -----------------------------------------------------------
  # RabbitMQ - Message Broker
  # AMQP: 5672  |  Consola admin: http://localhost:15672
  # -----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # guias-service (puerto INTERNO 8090)
  # Acceso público único via gateway:8080/api/v1/guias/**
  # -----------------------------------------------------------
  guias-service:
    build:
      context: ./guias-service
      dockerfile: Dockerfile
    container_name: guias-service
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090

      # ── Base de datos PostgreSQL RDS ──────────────────────
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      SPRING_DATASOURCE_DRIVER: ${DB_DRIVER:-org.h2.Driver}
      JPA_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.H2Dialect}
      DB_URL: ${DB_URL:-jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}

      # ── AWS S3 (real en prod, credenciales desde secrets) ─
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ENDPOINT_OVERRIDE: ${AWS_ENDPOINT_OVERRIDE:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-guias-bucket}

      # ── EFS / PDF ─────────────────────────────────────────
      EFS_MOUNT_PATH: /tmp/efs-local
      PDF_ASYNC_POOL_SIZE: 4

      # ── RabbitMQ ──────────────────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}

      # ── Azure AD B2C ──────────────────────────────────────
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}

      # ── JVM ───────────────────────────────────────────────
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Xmx160m"
    deploy:
      resources:
        limits:
          memory: 200M
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - /tmp/efs-local:/tmp/efs-local
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # producer (puerto INTERNO 8081)
  # Acceso público único via gateway:8080/api/v1/producer/**
  # -----------------------------------------------------------
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081

      # ── RabbitMQ ──────────────────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}

      # ── Azure AD B2C ──────────────────────────────────────
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}

      # ── JVM ───────────────────────────────────────────────
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # consumer (puerto INTERNO 8082)
  # Acceso público único via gateway:8080/api/v1/consumer/**
  # -----------------------------------------------------------
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082

      # ── Base de datos PostgreSQL RDS ──────────────────────
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:h2:mem:consumerdb;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      SPRING_DATASOURCE_DRIVER: ${DB_DRIVER:-org.h2.Driver}
      JPA_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.H2Dialect}
      DB_URL: ${DB_URL:-jdbc:h2:mem:consumerdb;DB_CLOSE_DELAY=-1}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}

      # ── RabbitMQ ──────────────────────────────────────────
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}

      # ── Azure AD B2C ──────────────────────────────────────
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}

      # ── JVM ───────────────────────────────────────────────
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # API Gateway — punto de entrada único (puerto 8080)
  # Primera capa: valida JWT Azure AD B2C
  # Segunda capa: cada microservicio valida de nuevo
  # -----------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080

      # ── URLs internas de los microservicios ───────────────
      GUIAS_SERVICE_URL: http://guias-service:8090
      PRODUCER_URL: http://producer:8081
      CONSUMER_URL: http://consumer:8082

      # ── Azure AD B2C ──────────────────────────────────────
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}

      # ── JVM ───────────────────────────────────────────────
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      - guias-service
      - producer
      - consumer
    networks:
      - sem8-net

networks:
  sem8-net:
    driver: bridge
