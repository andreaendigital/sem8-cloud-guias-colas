version: '3.9'

# =============================================================
# MONOREPO sem8
# Servicios: gateway | guias-service | producer | consumer
#            rabbitmq | localstack
#
# Punto de entrada único: http://localhost:8080
#   /api/v1/guias/**    → guias-service:8090
#   /api/v1/producer/** → producer:8081
#   /api/v1/consumer/** → consumer:8082
# =============================================================

services:

  # -----------------------------------------------------------
  # RabbitMQ - Message Broker
  # AMQP: 5672  |  Consola admin: http://localhost:15672
  # usuario: guest / guest
  # -----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # LocalStack — simula Amazon S3 localmente
  # -----------------------------------------------------------
  localstack:
    image: localstack/localstack:3.0
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # guias-service (puerto INTERNO 8090 — acceso público via gateway:8080)
  # -----------------------------------------------------------
  guias-service:
    build:
      context: ./guias-service
      dockerfile: Dockerfile
    container_name: guias-service
    ports:
      - "8090:8090"          # Expuesto localmente para debug; en prod solo el gateway lo llama
    environment:
      SERVER_PORT: 8090
      DB_URL: jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1
      DB_USERNAME: sa
      DB_PASSWORD: ""
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      AWS_ENDPOINT_OVERRIDE: http://localstack:4566
      S3_BUCKET_NAME: guias-local
      EFS_MOUNT_PATH: /tmp/efs-local
      PDF_ASYNC_POOL_SIZE: 4
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Xmx160m"
    deploy:
      resources:
        limits:
          memory: 200M
    depends_on:
      rabbitmq:
        condition: service_healthy
      localstack:
        condition: service_healthy
    volumes:
      - /tmp/efs-local:/tmp/efs-local
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # producer (puerto INTERNO 8081 — acceso público via gateway:8080)
  # -----------------------------------------------------------
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # consumer (puerto INTERNO 8082 — acceso público via gateway:8080)
  # -----------------------------------------------------------
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      DB_URL: jdbc:h2:mem:consumerdb;DB_CLOSE_DELAY=-1
      DB_USERNAME: sa
      DB_PASSWORD: ""
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # API Gateway — punto de entrada único (puerto 8080)
  # Valida JWT Azure AD B2C y enruta a los microservicios internos
  # -----------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      GUIAS_SERVICE_URL: http://guias-service:8090
      PRODUCER_URL: http://producer:8081
      CONSUMER_URL: http://consumer:8082
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      - guias-service
      - producer
      - consumer
    networks:
      - sem8-net

networks:
  sem8-net:
    driver: bridge
