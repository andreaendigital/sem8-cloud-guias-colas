version: '3.9'

# =============================================================
# DESARROLLO LOCAL — docker-compose.yml
# Usa build: para compilar desde código fuente.
# Para producción en EC2 el CI/CD usa imágenes de Docker Hub.
#
# Uso:
#   docker compose up --build
#
# Variables opcionales en .env local:
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
# =============================================================

services:

  # -----------------------------------------------------------
  # RabbitMQ con configuración personalizada
  # Consola admin: http://localhost:15672  (guest/guest)
  # -----------------------------------------------------------
  rabbitmq:
    build:
      context: ./rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # guias-service — puerto 8080
  # -----------------------------------------------------------
  guias-service:
    build:
      context: ./guias-service
      dockerfile: Dockerfile
    container_name: guias-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      # BD — H2 en memoria para desarrollo local
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      SPRING_DATASOURCE_DRIVER: ${DB_DRIVER:-org.h2.Driver}
      JPA_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.H2Dialect}
      DB_URL: ${DB_URL:-jdbc:h2:mem:guiasdb;DB_CLOSE_DELAY=-1}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}
      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ENDPOINT_OVERRIDE: ${AWS_ENDPOINT_OVERRIDE:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-guias-local}
      EFS_MOUNT_PATH: /tmp/efs-local
      PDF_ASYNC_POOL_SIZE: 4
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      # Azure AD B2C
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Xmx160m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # producer — puerto 8081
  # -----------------------------------------------------------
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # consumer — puerto 8082
  # -----------------------------------------------------------
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      # BD — H2 en memoria para desarrollo local
      SPRING_DATASOURCE_URL: ${DB_URL:-jdbc:h2:mem:consumerdb;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-}
      SPRING_DATASOURCE_DRIVER: ${DB_DRIVER:-org.h2.Driver}
      JPA_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.H2Dialect}
      DB_URL: ${DB_URL:-jdbc:h2:mem:consumerdb;DB_CLOSE_DELAY=-1}
      DB_USERNAME: ${DB_USERNAME:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

networks:
  sem8-net:
    driver: bridge
