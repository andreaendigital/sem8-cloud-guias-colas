version: '3.9'

# =============================================================
# PRODUCCIÓN — docker-compose.prod.yml
# Usa imágenes pre-buildeadas desde Docker Hub.
# NO requiere código fuente ni carpetas de microservicios.
# Se despliega en EC2 via GitHub Actions CI/CD.
#
# Variables requeridas en .env del EC2 (generadas por CI/CD):
#   DOCKERHUB_USERNAME
#   AZURE_TENANT_ID, AZURE_CLIENT_ID, AZURE_CLIENT_SECRET
#   DB_URL, DB_USERNAME, DB_PASSWORD, DB_DRIVER, DB_DIALECT
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, S3_BUCKET_NAME
#   RABBITMQ_HOST, RABBITMQ_USERNAME, RABBITMQ_PASSWORD
# =============================================================

services:

  # -----------------------------------------------------------
  # RabbitMQ - Message Broker
  # AMQP: 5672  |  Consola admin: http://EC2-IP:15672
  # -----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # guias-service — imagen desde Docker Hub
  # -----------------------------------------------------------
  guias-service:
    image: ${DOCKERHUB_USERNAME}/guias-service:latest
    container_name: guias-service
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: 8090

      # ── Base de datos PostgreSQL RDS ──────────────────────
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      JPA_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.PostgreSQLDialect}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # ── AWS S3 ────────────────────────────────────────────
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_ENDPOINT_OVERRIDE: ""
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}

      # ── EFS / PDF ─────────────────────────────────────────
      EFS_MOUNT_PATH: /tmp/efs-local
      PDF_ASYNC_POOL_SIZE: 4

      # ── RabbitMQ ──────────────────────────────────────────
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}

      # ── Azure AD B2C ──────────────────────────────────────
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}

      # ── JVM ───────────────────────────────────────────────
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -Xmx160m"
    deploy:
      resources:
        limits:
          memory: 200M
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - efs-data:/tmp/efs-local
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # producer — imagen desde Docker Hub
  # -----------------------------------------------------------
  producer:
    image: ${DOCKERHUB_USERNAME}/producer:latest
    container_name: producer
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # consumer — imagen desde Docker Hub
  # -----------------------------------------------------------
  consumer:
    image: ${DOCKERHUB_USERNAME}/consumer:latest
    container_name: consumer
    ports:
      - "8082:8082"
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER: ${DB_DRIVER:-org.postgresql.Driver}
      JPA_DIALECT: ${DB_DIALECT:-org.hibernate.dialect.PostgreSQLDialect}
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sem8-net

  # -----------------------------------------------------------
  # gateway — imagen desde Docker Hub
  # Punto de entrada único: http://EC2-IP:8080
  # -----------------------------------------------------------
  gateway:
    image: ${DOCKERHUB_USERNAME}/gateway:latest
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      GUIAS_SERVICE_URL: http://guias-service:8090
      PRODUCER_URL: http://producer:8081
      CONSUMER_URL: http://consumer:8082
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      JAVA_OPTS: "-Xmx120m"
    deploy:
      resources:
        limits:
          memory: 150M
    depends_on:
      - guias-service
      - producer
      - consumer
    networks:
      - sem8-net

networks:
  sem8-net:
    driver: bridge

volumes:
  efs-data:
